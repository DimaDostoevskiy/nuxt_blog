name: Deploy Node.js App

on:
  push:
    branches: ['master']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "📦 Go to project folder..."
            cd moto_blog

            echo "📦 Pulling latest changes..."
            git pull origin master

            echo "📦 Installing dependencies..."
            npm install

            echo "📦 Building..."
            npm run build

            if [ ! -f .output/server/index.mjs ]; then
              echo "❌ Build failed: .output/server/index.mjs not found"
              exit 1
            fi

            echo "📦 Restarting PM2..."
            pm2 restart pro_moto_blog

            echo "✅ Deployment complete!"

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Статус: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}
            Репозиторий: moto_blog
            Сообщение: ${{ github.event.head_commit.message }}
            Ветка: ${{ github.ref_name }}
            Автор: ${{ github.actor }}
